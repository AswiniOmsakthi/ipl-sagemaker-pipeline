name: Pipeline 2 - ML - Train and Register Model

on:
  workflow_run:
    workflows:
      - "Pipeline 1 - Infra - Create SageMaker Studio"
    types:
      - completed
  workflow_dispatch:

jobs:
  run-sagemaker-pipeline:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "sagemaker==2.232.2"
          pip install boto3 scikit-learn pandas joblib

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read Infra Outputs from S3
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python - <<'EOF'
          import boto3
          import json
          import os

          region  = os.environ.get("AWS_REGION", "us-east-1")
          account = boto3.client("sts", region_name=region)\
                         .get_caller_identity()["Account"]
          bucket  = f"sagemaker-ipl-pipeline-{account}"
          s3      = boto3.client("s3", region_name=region)

          try:
              response = s3.get_object(
                  Bucket=bucket,
                  Key="infra/infra_outputs.json"
              )
              infra = json.loads(response["Body"].read())

              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"ROLE_ARN={infra['role_arn']}\n")
                  f.write(f"DOMAIN_ID={infra['domain_id']}\n")
                  f.write(f"BUCKET={infra['bucket_name']}\n")

              print(f"✅ Role ARN  : {infra['role_arn']}")
              print(f"✅ Domain ID : {infra['domain_id']}")
              print(f"✅ Bucket    : {infra['bucket_name']}")

          except Exception as e:
              print(f"⚠️ S3 read failed: {str(e)}")
              print(f"⚠️ Using fallback secrets")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"ROLE_ARN={os.environ.get('AWS_ROLE_ARN', '')}\n")
          EOF

      - name: Run SageMaker Pipeline
        env:
          AWS_ROLE_ARN : ${{ env.ROLE_ARN }}
          AWS_REGION   : ${{ secrets.AWS_REGION }}
          DOMAIN_ID    : ${{ env.DOMAIN_ID }}
          BUCKET       : ${{ env.BUCKET }}
        run: |
          python run_pipeline.py